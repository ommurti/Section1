<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-gray-100 flex items-center justify-center h-screen">
        <div class="border-2 border-blue-200 w-1/4 p-10 
        bg-white rounded-xl p-8 shadow-xl ">

        <h2 class="text-3xl text-center font-bold my-6">Login Form</h2>

        <form>

            <label for="">Email Address</label>
            <input class="border px-4 py-2 w-full rounded-md mb-4" type="email">

            <label for="">Password</label>
            <input class="border px-4 py-2 w-full rounded-md mb-4" type="password">

            <a href="#" class="text-[blueviolet] block mb-2">Forgot Password?</a>

            <button class="bg-[blue] block w-full text-white p-2 rounded-md">Submit</button>

            <a href="#" class="text-[blueviolet] block text-center mt-4 ">Not registered yet? Sign up</a>

        </form>

    </div>
  </body>
</html>
