<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="style.css">

    <style>
        h2 {
            color: blue;
            text-decoration: underline wavy red;

        }

        .text {
            color: crimson;
            border: 1px solid crimson;
        }

        #mytext {
            background-color: blue;
            color: yellow;
            font-weight: bold;
        }

        h3 {
            color: blue !important;
        }

        .myclass {
            color: brown;
        }

        #myid {
            color: blueviolet;
        }
    </style>
</head>

<body>

    <h1 style="color: red; font-size: 60px;">Inline CSS is used to style individual tag only</h1>

    <h2>Internal CSS is used to style multiple tags at once</h2>

    <h2 class="text">Name Selector is used to select elements by their tag name</h2>

    <p class="text">Class selector is used to select elements by their class name</p>

    <p id="mytext">Id Selector is used to select elements by their id name</p>
    <h3 class="myclass" id="myid" style="color: cyan; ">Selector Priority</h3>

    <button class="btn">Submit</button>
</body>

</html>
