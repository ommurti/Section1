<!DOCTYPE html>
<html>
<head>
  <title>Movie Ticket Booking Form</title>
</head>
<body>
  <h2>🎬 Movie Ticket Booking</h2>
  <form action="/submit-ticket" method="post">
    
    <!-- Movie Selection -->
    <label for="movie">Select Movie:</label>
    <select id="movie" name="movie" required>
      <option value="">--Choose a Movie--</option>
      <option value="">Dhurandhar</option>
      <option value="Dhurandhar 2">Dhurandhar 2</option>
      <option value="Narshimha">Narshimha</option>
    </select>
    <br><br>

    <!-- Date -->
    <label for="date">Show Date:</label>
    <input type="date" id="date" name="date" required>
    <br><br>

    <!-- Time -->
    <label for="time">Show Time:</label>
    <input type="time" id="time" name="time" required>
    <br><br>

    <!-- Number of Tickets -->
    <label for="tickets">Number of Tickets:</label>
    <input type="number" id="tickets" name="tickets" min="1" max="10" required>
    <br><br>

    <!-- Seat Type -->
    <label>Seat Type:</label><br>
    <input type="radio" id="regular" name="seat" value="Regular" required>
    <label for="regular">Regular</label><br>
    <input type="radio" id="premium" name="seat" value="Premium">
    <label for="premium">Premium</label><br>
    <input type="radio" id="vip" name="seat" value="VIP">
    <label for="vip">VIP</label>
    <br><br>

    <!-- User Details -->
    <label for="name">Your Name:</label>
    <input type="text" id="name" name="name" required>
    <br><br>

    <label for="email">Email Address:</label>
    <input type="email" id="email" name="email" required>
    <br><br>

    <!-- Submit -->
    <button type="submit">Book Tickets</button>
  </form>
</body>
</html>
